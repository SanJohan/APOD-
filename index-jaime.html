<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Date Picker Nativo</title>
    <link href="https://cdn.jsdelivr.net/npm/@coreui/coreui@5.0.2/dist/css/coreui.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5">
        <h2>Nasa Picture of the Day</h2>
        <p class="text-muted">Each day a different image of our universe along with a brief explanation</p>

        <div class="row">
            <div class="col-sm-6 col-lg-5 mb-3">
                <label class="form-label">Selecciona una fecha:</label>
                <input type="date" class="form-control" max="2026-06-24">
            </div>
        </div>
    </div>


    <div class="container mt-5">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Imagen del día</h5>
                <p class="card-text">Aquí se mostrará la imagen correspondiente a la fecha seleccionada.</p>
                <img id="nasa-image" src="" alt="Imagen de la NASA del día">

            </div>
        </div>
    </div>

    <div class="container mt-5">
        <div class="añadir a favoritos">
            <button id="add-favorite" class="btn btn-primary">Añadir a favoritos</button>
        </div>
    </div>


    <div class="container mt-5">
        <div class="favoritos">
            <h5>Favoritos</h5>
            <ul id="favoritos-list" class="list-group">
            </ul>
        </div>
    </div>


</html>
